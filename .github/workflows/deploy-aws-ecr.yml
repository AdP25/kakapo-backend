# Build and push the API image to Amazon ECR. Optionally roll an ECS service.
#
# Prerequisites (once per AWS account / repo):
# 1. Create an ECR repository (name must match ECR_REPOSITORY below or override with repo variable).
# 2. IAM OIDC provider for GitHub + an IAM role with:
#    - ecr:GetAuthorizationToken (on *)
#    - ecr:BatchCheckLayerAvailability, ecr:CompleteLayerUpload, ecr:InitiateLayerUpload,
#      ecr:PutImage, ecr:UploadLayerPart on the ECR repo ARN
#    - (optional) ecs:UpdateService, ecs:DescribeServices on your cluster/service for deploy step
# 3. GitHub repo secret: AWS_ROLE_ARN = arn:aws:iam::ACCOUNT:role/ROLE_NAME
# 4. GitHub repo variables (Settings → Secrets and variables → Actions → Variables):
#    - AWS_REGION (e.g. us-east-1)
#    - ECR_REPOSITORY (e.g. kakapo-backend)
#    - ENABLE_ECS_DEPLOY = true (optional) + ECS_CLUSTER + ECS_SERVICE to force new deployment

name: Deploy backend (ECR)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY != '' && vars.ECR_REPOSITORY || 'kakapo-backend' }}
        run: |
          set -eux
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Force ECS new deployment
        if: ${{ vars.ENABLE_ECS_DEPLOY == 'true' && vars.ECS_CLUSTER != '' && vars.ECS_SERVICE != '' }}
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment
